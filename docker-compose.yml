services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-robotics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robotics_dev}
      POSTGRES_DB: ${POSTGRES_DB:-robotics_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robotics} -d ${POSTGRES_DB:-robotics_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-robotics}:${POSTGRES_PASSWORD:-robotics_dev}@db:5432/${POSTGRES_DB:-robotics_db}
      AUTH_SECRET: ${AUTH_SECRET:-dev_secret_change_before_production}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
